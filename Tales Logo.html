<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tales — Brand Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Lora', serif; background: #0f0a1a; }

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, oklch(32% 0.16 30 / 0.75) 0%, transparent 55%),
    radial-gradient(ellipse 65% 50% at 82% 80%, oklch(30% 0.18 350 / 0.65) 0%, transparent 52%),
    radial-gradient(ellipse 50% 40% at 55% 50%, oklch(22% 0.10 55 / 0.40) 0%, transparent 60%),
    #0f0a1a;
}

#stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

.blobs { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.blob { position: absolute; border-radius: 50%; filter: blur(70px); }
.blob-1 { width: 500px; height: 500px; background: oklch(72% 0.20 55 / 0.14); top: -120px; left: -100px; animation: floatA 18s ease-in-out infinite; }
.blob-2 { width: 420px; height: 420px; background: oklch(65% 0.22 350 / 0.12); bottom: -80px; right: -80px; animation: floatB 22s ease-in-out infinite; }
.blob-3 { width: 280px; height: 280px; background: oklch(78% 0.16 50 / 0.10); top: 40%; left: 10%; animation: floatC 26s ease-in-out infinite; }
.blob-4 { width: 220px; height: 220px; background: oklch(68% 0.20 15 / 0.10); top: 15%; right: 12%; animation: floatA 20s ease-in-out 2s infinite; }

.stage {
  position: relative; z-index: 10;
  width: 100%; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* ── Logo icon ── */
.logo-icon-wrap { margin-bottom: 28px; animation: riseIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }
.logo-icon {
  width: 108px; height: 108px; border-radius: 30px;
  background: linear-gradient(145deg, oklch(72% 0.20 55) 0%, oklch(65% 0.22 30) 50%, oklch(62% 0.24 350) 100%);
  box-shadow:
    0 0 0 1px oklch(72% 0.20 55 / 0.3),
    0 20px 60px oklch(65% 0.22 30 / 0.45),
    0 4px 16px oklch(62% 0.24 350 / 0.25),
    inset 0 1px 0 rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  animation: iconFloat 4s ease-in-out 1s infinite;
}
.logo-icon::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(160deg, rgba(255,255,255,0.20) 0%, transparent 50%);
  pointer-events: none;
}
.shimmer {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden; border-radius: inherit; pointer-events: none;
}
.shimmer::after {
  content: '';
  position: absolute; top: -20%; width: 40%; height: 140%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  animation: shimmer 3.5s ease-in-out 1.5s infinite;
  transform: rotate(25deg);
}

/* ── Wordmark ── */
.wordmark { display: flex; align-items: baseline; gap: 3px; animation: fadeUp 0.7s ease 0.3s both; }
.wordmark-text {
  font-family: 'Lora', serif; font-weight: 600; font-size: 64px;
  letter-spacing: -1.5px; line-height: 1;
  background: linear-gradient(135deg, oklch(92% 0.08 55) 0%, oklch(88% 0.12 30) 40%, oklch(88% 0.10 350) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.wordmark-dot {
  width: 10px; height: 10px; border-radius: 50%; margin-bottom: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, oklch(72% 0.20 55), oklch(65% 0.22 30));
  box-shadow: 0 2px 8px oklch(72% 0.20 55 / 0.5);
}

/* ── Tagline ── */
.tagline {
  animation: fadeUp 0.7s ease 0.5s both;
  margin-top: 14px;
  font-family: 'Nunito', sans-serif; font-weight: 400; font-size: 16px;
  letter-spacing: 0.5px; color: oklch(80% 0.06 40 / 0.60);
}

/* ── Variants bar ── */
.variants-bar {
  animation: fadeUp 0.7s ease 0.7s both;
  position: absolute; bottom: 44px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.variants-label {
  font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.22);
}
.variants-row { display: flex; gap: 28px; align-items: center; }
.sep { width: 1px; height: 28px; background: rgba(255,255,255,0.10); }

/* Full lockup sm */
.logo-sm { display: flex; align-items: center; gap: 9px; }
.logo-sm-badge {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(145deg, oklch(72% 0.20 55), oklch(62% 0.24 350));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px oklch(65% 0.22 30 / 0.4); flex-shrink: 0;
  position: relative; overflow: hidden;
}
.logo-sm-badge::before { content:''; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(150deg,rgba(255,255,255,0.18) 0%,transparent 55%); }
.logo-sm-text {
  font-family: 'Lora', serif; font-weight: 600; font-size: 22px;
  background: linear-gradient(135deg, oklch(90% 0.08 55), oklch(86% 0.10 350));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: -0.5px;
}

/* Icon only */
.logo-icon-sm {
  width: 44px; height: 44px; border-radius: 13px;
  background: linear-gradient(145deg, oklch(72% 0.20 55), oklch(62% 0.24 350));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 12px oklch(65% 0.22 30 / 0.4);
  position: relative; overflow: hidden;
}
.logo-icon-sm::before { content:''; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(150deg,rgba(255,255,255,0.18) 0%,transparent 55%); }

/* Text only */
.logo-text-only {
  font-family: 'Lora', serif; font-weight: 600; font-size: 26px;
  background: linear-gradient(135deg, oklch(90% 0.08 55), oklch(86% 0.10 350));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: -0.5px;
}

/* ── Keyframes ── */
@keyframes riseIn  { from{transform:scale(0.75) translateY(22px)} to{transform:scale(1) translateY(0)} }
@keyframes fadeUp  { from{transform:translateY(14px)} to{transform:translateY(0)} }
@keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes shimmer { 0%{transform:translateX(-120%) rotate(25deg)} 100%{transform:translateX(300%) rotate(25deg)} }
@keyframes floatA  { 0%,100%{transform:translate(0,0)} 33%{transform:translate(22px,18px)} 66%{transform:translate(-12px,28px)} }
@keyframes floatB  { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-22px)} }
@keyframes floatC  { 0%,100%{transform:translate(0,0)} 50%{transform:translate(16px,-16px)} }
</style>
</head>
<body>

<div class="bg"></div>
<canvas id="stars"></canvas>
<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<div class="stage">

  <!-- Hero icon -->
  <div class="logo-icon-wrap">
    <div class="logo-icon">
      <div class="shimmer"></div>
      <!-- Bold T lettermark -->
      <svg width="66" height="66" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8"  y="12" width="52" height="13" rx="6.5" fill="rgba(255,255,255,0.96)"/>
        <rect x="27" y="23" width="14" height="34" rx="7"   fill="rgba(255,255,255,0.96)"/>
      </svg>
    </div>
  </div>

  <!-- Wordmark -->
  <div class="wordmark">
    <span class="wordmark-text">Tales</span>
    <span class="wordmark-dot"></span>
  </div>

  <!-- Tagline -->
  <p class="tagline">Stories that belong to your child</p>

  <!-- Variants -->
  <div class="variants-bar">
    <div class="variants-label">Logo variants</div>
    <div class="variants-row">

      <!-- Full lockup -->
      <div class="logo-sm">
        <div class="logo-sm-badge">
          <svg width="20" height="20" viewBox="0 0 68 68" fill="none" style="position:relative;z-index:1">
            <rect x="8"  y="12" width="52" height="13" rx="6.5" fill="rgba(255,255,255,0.96)"/>
            <rect x="27" y="23" width="14" height="34" rx="7"   fill="rgba(255,255,255,0.96)"/>
          </svg>
        </div>
        <span class="logo-sm-text">Tales</span>
      </div>

      <div class="sep"></div>

      <!-- Icon only -->
      <div class="logo-icon-sm">
        <svg width="26" height="26" viewBox="0 0 68 68" fill="none" style="position:relative;z-index:1">
          <rect x="8"  y="12" width="52" height="13" rx="6.5" fill="rgba(255,255,255,0.96)"/>
          <rect x="27" y="23" width="14" height="34" rx="7"   fill="rgba(255,255,255,0.96)"/>
        </svg>
      </div>

      <div class="sep"></div>

      <!-- Text only -->
      <span class="logo-text-only">Tales</span>

    </div>
  </div>

</div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
for (let i = 0; i < 140; i++) stars.push({ x: Math.random(), y: Math.random(), r: Math.random()*1.4+0.2, speed: Math.random()*0.003+0.001, phase: Math.random()*Math.PI*2, delay: Math.random()*2 });
let t0 = null;
function draw(t) {
  if (!t0) t0 = t;
  const elapsed = (t - t0) / 1000;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const age = Math.max(0, elapsed - s.delay);
    const fadeIn = Math.min(1, age * 0.8);
    const pulse = 0.3 + 0.7*(0.5+0.5*Math.sin(elapsed*s.speed*60+s.phase));
    ctx.beginPath();
    ctx.arc(s.x*canvas.width, s.y*canvas.height, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${fadeIn*pulse*0.75})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
